<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/public/PD-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/style.css">
  <title>Productivity-Dashboard</title>
</head>

<body>
  <div class="main">
    <header class="nav">
      <h1>.Productivity</h1>
      <div class="circleBox">
        <div class="circle1">
          <a href="https://github.com/iharshkaran" target="_blank">
            <img src="assets/github.svg" alt="GitHub">
          </a>
        </div>
        <div class="circle2"><img src="assets/dark-theme.png" alt=""></div>
      </div>
    </header>
    <section class="hero">
      
      <div class="hero1">
        <h4 class="currentDay"></h4>
        <h1 class="currentTime"></h1>
        <h3 class="currentLocation"></h3>
      </div>
      <div class="hero2">
        <h1 class="currentTemp"></h1>
        <h3 class="weatherType"></h3>
        <h5 class="humidity"></h5>
        <h5 class="precipitation"></h5>
        <h5 class="wind"></h5>
      </div>

    </section>
    <section class="allCards">
      <div class="card todo" id="0">
        <img src="/assets/img7.png" alt="img1">
        <h3>Todo list</h3>
      </div>
      <div class="card pomo" id="1">
        <img src="/assets/img2.jpg" alt="img2">
        <h3>Pomodoro Timer</h3>
      </div>
      <div class="card planner" id="2">
        <img src="/assets/img3.webp" alt="img3">
        <h3>Daily Planner</h3>
      </div>
      <div class="card moti" id="3">
        <img src="/assets/img4.jpg" alt="img4">
        <h3>Motivation</h3>
      </div>
    </section>

    <section class="cardPage todo-page">
      <button class="close-btn" id="0">✕</button>
      <h1>Your Personalized Task List</h1>
      <div class="todo-container">
        <div class="addTask">
          <form action="">
            <input type="text" placeholder="Enter Task" class="input">
            <textarea placeholder="Describe your task..." name="" id="" cols="30" rows="10"></textarea>
            <div class="checkbox">
              <input type="checkbox" name="checkbox" id="check">
              <label for="check">Mark as Important</label>
            </div>
            <button>Add Task</button>
          </form>
        </div>
        <div class="allTask">
          <div class="task">
            <button class="mark-btn true" id=${idx}><img src="assets/checkbox-icon.svg" alt="delete"></button>
            <h5 class="true">Radhee Radhee<span class="${tasks.imp}">imp</span></h5>
            <button class="view-btn" id=${idx}><img src="assets/details-icon.svg" alt="delete"></button>
            <button class="delete-btn" id=${idx}><img src="assets/delete-icon.svg" alt="delete"></button>
          </div>

        </div>
      </div>
    </section>
    <section class="todo-details-section">
    </section>

    <section class="cardPage pomodoro-page">
      <button class="close-btn" id="1">✕</button>
      <h1>Pomodoro Timer</h1>
      <div class="pomodoro-container">
        
        <div class = "sessionType">
          <div class="dot"></div>
          <h4 class = "sessionTypeTilte ">Focus Session</h4>
        </div>
        <div class="pomodoro-timer">
          <h1>25:00</h1>
        </div>
        <div class="pomodoro-btns">
          <button class="start-btn">Start</button>
          <button class="stop-btn">Pause</button>
          <button class="reset-btn">Reset</button>
        </div>
      </div>
    </section>

    <section class="cardPage daily-planner-page">
      <button class="close-btn" id="2">✕</button>
      <h1>Daily Planner</h1>
      <div class="daily-planner">

      </div>

    </section>

    <section class="cardPage motivational-page">
      <button class="close-btn" id="3">✕</button>
      <div class="motivational-container">
        <div class="motivational-card">
          <img src="assets/quote.svg" alt="">
          <div class="motivational-title">Quote of a Day</div>
          <div class="motivational-quote"></div>
          <div class="motivational-author"></div>
        </div>
      </div>
    </section>

  </div>

  <script type="module" src="/js/script.js"></script>
</body>

</html>
