<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/PD-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css">
    <title>Productivity-Dashboard</title>
  </head>
  <body>
    <div class="main">
      <section class="allCards">
        <div class="card todo">
          <img src="/assets/img1.webp" alt="img1">
          <h3>Todo list</h3>
        </div>
        <div class="card pomo">
          <img src="/assets/img2.jpg" alt="img2">
          <h3>Pomodoro Timer</h3>
        </div>
        <div class="card planner">
          <img src="/assets/img3.webp" alt="img3">
          <h3>Daily Planner</h3>
        </div>
        <div class="card moti">
          <img src="/assets/img4.jpg" alt="img4">
          <h3>Motivation</h3>
        </div>
        <div class="card goal">
          <img src="/assets/img5.jpg" alt="img5">
          <h3>Daily Goal</h3>
        </div>
      </section>
    </div>
    
    <script type="module" src="/js/script.js"></script>
  </body>
</html>
